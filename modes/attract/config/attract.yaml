#config_version=5
#attract mode config file

show_player:
   mode_attract_started:
      Joust:
         action: play
      
shows:      
   color_on:
    - time: 0  
      lights:
         (led): (color)
   Joust:
    - duration: 5
      segment_displays:
         neoSeg0:
            text: "GameOver"
            transition:
               type: push
         neoSeg2d0:
            text: "P1"
         neoSeg1:
            text: "GameOver"
            transition:
               type: push
         neoSeg2d2:
            text: "P2"
    - duration: 5
      segment_displays:
         neoSeg0:
            text: " JOUST "
            transition:
               type: push
         neoSeg2d0:
            text: "P1"
         neoSeg1:
            text: " JOUST "
            transition:
               type: push
         neoSeg2d2:
            text: "P2"

